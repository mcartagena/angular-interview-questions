<h1>Angular Signals</h1>

<input type="text" [value]="title()" (keyup)="changeTitle($event)" />

{{ title() }}

@for(user of users(); track user.id) {
  <div style="border: 1px solid black; margin: 10px; padding: 10px;">
    <p>{{ user.id }}</p>
    <p>{{ user.name }}</p>
  </div>
} @empty {
  <p>No users found.</p>
}

<p>Total users: {{ usersTotal() }}</p>

<router-outlet />
